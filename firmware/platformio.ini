[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps = h2zero/NimBLE-Arduino@^2.1.0
monitor_speed = 115200
; CONFIG_NIMBLE_CPP_LOG_LEVEL=1 turns on NimBLE's own error logging
; (NIMBLE_LOGE), which includes the GAP connect-failure reason code
; when a connection attempt is rejected below the application layer —
; classic ESP32's BLE controller is a closed, precompiled binary
; (CONFIG_BTDM_CTRL_BLE_MAX_CONN=3 in the framework's own sdkconfig.h,
; not overridable via -D here), so a connection failing above 2-3
; simultaneous peers may be a controller-level rejection that
; HubServerCallbacks::onConnect never sees. This makes that visible on
; the serial monitor instead of silently dropping the attempt.
build_flags =
    -D CONFIG_BT_NIMBLE_MAX_CONNECTIONS=7
    -D CONFIG_NIMBLE_CPP_LOG_LEVEL=1
